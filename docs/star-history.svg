<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480" role="img" aria-labelledby="title description">
  <title id="title">Stone star history</title>
  <desc id="description">The star history chart is being synchronized.</desc>
  <style>
    .title { fill: #f0f6fc; font: 700 24px Inter, "Segoe UI", Arial, sans-serif; }
    .subtitle { fill: #8b949e; font: 12px Inter, "Segoe UI", Arial, sans-serif; }
    .message { fill: #8b949e; font: 600 16px Inter, "Segoe UI", Arial, sans-serif; }
    .grid { stroke: #30363d; stroke-width: 1; }
  </style>
  <rect width="960" height="480" rx="10" fill="#0d1117"/>
  <rect x=".5" y=".5" width="959" height="479" rx="9.5" fill="none" stroke="#30363d"/>
  <text class="title" x="34" y="45">Stone Star History</text>
  <text class="subtitle" x="34" y="68">History stored in this repository</text>
  <line class="grid" x1="74" y1="104" x2="926" y2="104"/>
  <line class="grid" x1="74" y1="184" x2="926" y2="184"/>
  <line class="grid" x1="74" y1="264" x2="926" y2="264"/>
  <line class="grid" x1="74" y1="344" x2="926" y2="344"/>
  <line class="grid" x1="74" y1="422" x2="926" y2="422"/>
  <text class="message" x="480" y="272" text-anchor="middle">Synchronizing star history...</text>
</svg>
